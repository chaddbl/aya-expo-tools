<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AYA Expo Tools</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a;
      --bg-card: #141414;
      --bg-card-hover: #1a1a1a;
      --border: #222;
      --border-light: #333;
      --text: #e5e5e5;
      --text-dim: #888;
      --text-dimmer: #555;
      --accent: #fff;
      --green: #22c55e;
      --green-dim: #16a34a;
      --red: #ef4444;
      --red-dim: #dc2626;
      --amber: #f59e0b;
      --blue: #3b82f6;
      --cyan: #06b6d4;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ─── Header ─── */
    .header {
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .header-logo {
      height: 28px;
      width: auto;
      opacity: 0.9;
    }

    .header-divider {
      width: 1px;
      height: 20px;
      background: var(--border-light);
    }

    .header-title {
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .header-exhibition {
      font-size: 13px;
      color: var(--text-dim);
      font-family: 'JetBrains Mono', monospace;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2s ease-in-out infinite;
    }

    .status-dot.offline { background: var(--red); animation: none; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ─── Main Layout ─── */
    .main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px;
    }

    /* ─── Section ─── */
    .section {
      margin-bottom: 32px;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .section-actions {
      display: flex;
      gap: 8px;
    }

    /* ─── Buttons ─── */
    .btn {
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 500;
      padding: 8px 16px;
      border: 1px solid var(--border-light);
      border-radius: 6px;
      background: var(--bg-card);
      color: var(--text);
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn:hover { background: var(--bg-card-hover); border-color: var(--text-dimmer); }
    .btn:active { transform: scale(0.97); }

    .btn-on {
      background: rgba(34, 197, 94, 0.1);
      border-color: rgba(34, 197, 94, 0.3);
      color: var(--green);
    }
    .btn-on:hover { background: rgba(34, 197, 94, 0.2); }

    .btn-off {
      background: rgba(239, 68, 68, 0.1);
      border-color: rgba(239, 68, 68, 0.3);
      color: var(--red);
    }
    .btn-off:hover { background: rgba(239, 68, 68, 0.2); }

    .btn-sm { padding: 5px 10px; font-size: 11px; }

    .btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    /* ─── Projector Grid ─── */
    .projector-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
    }

    .projector-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }

    .projector-card:hover {
      border-color: var(--border-light);
      background: var(--bg-card-hover);
    }

    .projector-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--border);
      transition: background 0.3s;
    }

    .projector-card.power-on::before { background: var(--green); }
    .projector-card.power-off::before { background: var(--text-dimmer); }
    .projector-card.power-warmup::before { background: var(--amber); }
    .projector-card.power-cooling::before { background: var(--blue); }
    .projector-card.power-unreachable::before { background: var(--red); }

    .proj-name {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .proj-ip {
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-dimmer);
      margin-bottom: 12px;
    }

    .proj-status {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 8px;
    }

    .proj-status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }

    .proj-status-dot.on { background: var(--green); }
    .proj-status-dot.off { background: var(--text-dimmer); }
    .proj-status-dot.warmup { background: var(--amber); }
    .proj-status-dot.cooling { background: var(--blue); }
    .proj-status-dot.unreachable { background: var(--red); }
    .proj-status-dot.unknown { background: var(--text-dimmer); opacity: 0.5; }

    .proj-status-text {
      font-size: 12px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .proj-meta {
      font-size: 11px;
      color: var(--text-dimmer);
      margin-bottom: 12px;
    }

    .proj-actions {
      display: flex;
      gap: 6px;
    }

    /* ─── Camera Grid ─── */
    .camera-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
    }

    .camera-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      transition: all 0.2s;
    }

    .camera-card:hover {
      border-color: var(--border-light);
    }

    .cam-name {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .cam-ip {
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-dimmer);
      margin-bottom: 8px;
    }

    .cam-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
    }

    .cam-snapshot {
      width: 100%;
      height: 120px;
      background: #111;
      border-radius: 6px;
      margin-top: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-dimmer);
      font-size: 11px;
      overflow: hidden;
    }

    .cam-snapshot img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* ─── Schedule ─── */
    .schedule-bar {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    .schedule-times {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .schedule-label {
      font-size: 11px;
      color: var(--text-dimmer);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .schedule-time {
      font-family: 'JetBrains Mono', monospace;
      font-size: 20px;
      font-weight: 500;
    }

    .schedule-arrow {
      color: var(--text-dimmer);
      font-size: 18px;
    }

    .toggle {
      width: 40px;
      height: 22px;
      background: var(--border-light);
      border-radius: 11px;
      cursor: pointer;
      position: relative;
      transition: background 0.2s;
    }

    .toggle.active { background: var(--green); }

    .toggle::after {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: white;
      top: 3px;
      left: 3px;
      transition: transform 0.2s;
    }

    .toggle.active::after {
      transform: translateX(18px);
    }

    /* ─── Network Status ─── */
    .network-bar {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

    .net-chip {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
    }

    .net-chip .label { color: var(--text-dim); }
    .net-chip .value { font-weight: 500; font-family: 'JetBrains Mono', monospace; font-size: 11px; }

    /* ─── Footer ─── */
    .footer {
      border-top: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 40px;
    }

    .footer-left {
      font-size: 11px;
      color: var(--text-dimmer);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .footer-right {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--text-dimmer);
    }

    .pi-mark {
      height: 14px;
      width: 14px;
    }

    /* ─── Loading ─── */
    .loading-spinner {
      width: 14px;
      height: 14px;
      border: 2px solid var(--border-light);
      border-top-color: var(--text);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: inline-block;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── Toast ─── */
    .toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 200;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .toast {
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 12px;
      animation: slideIn 0.2s ease-out;
      max-width: 320px;
    }

    .toast.success { border-color: rgba(34, 197, 94, 0.3); }
    .toast.error { border-color: rgba(239, 68, 68, 0.3); }

    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    /* ─── Responsive ─── */
    @media (max-width: 768px) {
      .main { padding: 16px; }
      .projector-grid { grid-template-columns: repeat(2, 1fr); }
      .camera-grid { grid-template-columns: repeat(2, 1fr); }
      .header-exhibition { display: none; }
      .schedule-time { font-size: 16px; }
    }

    @media (max-width: 480px) {
      .projector-grid { grid-template-columns: 1fr; }
      .camera-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

  <script>
    // ─── State ──────────────────────────────────────
    let ws;
    let state = { projectors: [], cameras: [], schedule: {}, exhibition: {} };

    // ─── WebSocket ──────────────────────────────────
    function connectWS() {
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${proto}//${location.host}`);

      ws.onopen = () => {
        document.getElementById('ws-status').classList.remove('offline');
      };

      ws.onclose = () => {
        document.getElementById('ws-status').classList.add('offline');
        setTimeout(connectWS, 3000);
      };

      ws.onmessage = (event) => {
        const msg = JSON.parse(event.data);
        switch (msg.type) {
          case 'init':
            state = msg.data;
            renderAll();
            break;
          case 'projectors':
            state.projectors = msg.data;
            renderProjectors();
            break;
          case 'projector':
            const idx = state.projectors.findIndex(p => p.id === msg.data.id);
            if (idx >= 0) state.projectors[idx] = msg.data;
            renderProjectors();
            break;
          case 'cameras':
            state.cameras = msg.data;
            renderCameras();
            break;
        }
      };
    }

    // ─── Render ─────────────────────────────────────
    function renderAll() {
      document.getElementById('exhibition-name').textContent =
        `${state.exhibition.name || ''} · ${state.exhibition.venue || ''}`;
      document.title = `AYA · ${state.exhibition.name || 'Expo Tools'}`;
      renderProjectors();
      renderCameras();
      renderSchedule();
      updateNetworkBar();
    }

    function renderProjectors() {
      const grid = document.getElementById('projector-grid');
      grid.innerHTML = state.projectors.map(p => `
        <div class="projector-card power-${p.power}">
          <div class="proj-name">${p.name}</div>
          <div class="proj-ip">${p.ip}</div>
          <div class="proj-status">
            <div class="proj-status-dot ${p.power}"></div>
            <span class="proj-status-text">${p.power}</span>
          </div>
          <div class="proj-meta">
            ${p.input && p.input !== 'unknown' ? p.input : ''}
            ${p.lamp ? ` · ${p.lamp.hours}h` : ''}
          </div>
          <div class="proj-actions">
            ${p.power === 'on'
              ? `<button class="btn btn-off btn-sm" onclick="projectorAction('${p.id}','off')">Desligar</button>`
              : `<button class="btn btn-on btn-sm" onclick="projectorAction('${p.id}','on')">Ligar</button>`
            }
          </div>
        </div>
      `).join('');
      updateNetworkBar();
    }

    function renderCameras() {
      const grid = document.getElementById('camera-grid');
      if (state.cameras.length === 0) {
        grid.innerHTML = '<div style="color:var(--text-dimmer);font-size:13px;">Nenhuma câmera configurada</div>';
        return;
      }
      grid.innerHTML = state.cameras.map(c => `
        <div class="camera-card">
          <div class="cam-name">${c.name}</div>
          <div class="cam-ip">${c.ip}</div>
          <div class="cam-status">
            <div class="status-dot ${c.online ? '' : 'offline'}" style="width:6px;height:6px;"></div>
            <span>${c.online ? 'Online' : 'Offline'}</span>
          </div>
          <div class="cam-snapshot" id="snap-${c.id}">
            ${c.online
              ? `<img src="/api/cameras/${c.id}/snapshot" onerror="this.parentElement.innerHTML='Sem preview'">`
              : 'Sem conexão'
            }
          </div>
        </div>
      `).join('');
      updateNetworkBar();
    }

    function renderSchedule() {
      const s = state.schedule || {};
      document.getElementById('sched-on').textContent = s.powerOn || '—';
      document.getElementById('sched-off').textContent = s.powerOff || '—';
      const toggle = document.getElementById('sched-toggle');
      const label = document.getElementById('sched-label');
      if (s.enabled) {
        toggle.classList.add('active');
        label.textContent = 'Ativo';
      } else {
        toggle.classList.remove('active');
        label.textContent = 'Desativado';
      }
    }

    function updateNetworkBar() {
      const projOn = state.projectors.filter(p => p.online).length;
      const projTotal = state.projectors.length;
      const camOn = state.cameras.filter(c => c.online).length;
      const camTotal = state.cameras.length;

      document.getElementById('net-proj-count').textContent = `${projOn}/${projTotal}`;
      document.getElementById('net-cam-count').textContent = `${camOn}/${camTotal}`;
    }

    // ─── API Calls ──────────────────────────────────
    async function api(method, path, body) {
      try {
        const opts = { method, headers: { 'Content-Type': 'application/json' } };
        if (body) opts.body = JSON.stringify(body);
        const res = await fetch(`/api${path}`, opts);
        return await res.json();
      } catch (err) {
        toast(`Erro: ${err.message}`, 'error');
        throw err;
      }
    }

    async function pollProjectors() {
      const spinner = document.getElementById('poll-spinner');
      spinner.style.display = 'inline-block';
      try {
        await api('POST', '/projectors/poll');
        toast('Projetores atualizados');
      } catch (e) {}
      spinner.style.display = 'none';
    }

    async function allProjectors(action) {
      toast(`${action === 'on' ? 'Ligando' : 'Desligando'} todos...`);
      await api('POST', `/projectors/all/${action}`);
    }

    async function projectorAction(id, action) {
      await api('POST', `/projectors/${id}/${action}`);
      toast(`${action === 'on' ? '⏻ Ligando' : '⏻ Desligando'} ${id}`);
    }

    async function checkCameras() {
      toast('Verificando câmeras...');
      await api('POST', '/cameras/check');
    }

    async function toggleSchedule() {
      const current = state.schedule?.enabled || false;
      const result = await api('POST', '/schedule', { enabled: !current });
      state.schedule = result;
      renderSchedule();
      toast(result.enabled ? 'Agenda ativada' : 'Agenda desativada');
    }

    async function scanNetwork() {
      const spinner = document.getElementById('scan-spinner');
      const results = document.getElementById('network-results');
      spinner.style.display = 'inline-block';
      results.innerHTML = 'Escaneando...';
      try {
        const data = await api('POST', '/network/scan');
        results.innerHTML = `
          <div style="margin-bottom:8px;color:var(--text);">
            ${data.devices.length} dispositivos encontrados em ${data.subnet}
          </div>
          <table style="width:100%;border-collapse:collapse;">
            <tr style="color:var(--text-dim);">
              <th style="text-align:left;padding:4px 8px;border-bottom:1px solid var(--border);">IP</th>
              <th style="text-align:left;padding:4px 8px;border-bottom:1px solid var(--border);">Tipo</th>
              <th style="text-align:left;padding:4px 8px;border-bottom:1px solid var(--border);">Serviços</th>
            </tr>
            ${data.devices.map(d => `
              <tr>
                <td style="padding:4px 8px;border-bottom:1px solid var(--border);">${d.ip}</td>
                <td style="padding:4px 8px;border-bottom:1px solid var(--border);">${d.type}</td>
                <td style="padding:4px 8px;border-bottom:1px solid var(--border);">${d.services.join(', ')}</td>
              </tr>
            `).join('')}
          </table>
        `;
      } catch (e) {
        results.innerHTML = 'Erro ao escanear';
      }
      spinner.style.display = 'none';
    }

    // ─── Health polling ─────────────────────────────
    async function pollHealth() {
      try {
        const h = await api('GET', '/health');
        document.getElementById('net-uptime').textContent = formatUptime(h.uptime);
        const inetDot = document.getElementById('net-internet');
        inetDot.classList.toggle('offline', !h.internet);
      } catch (e) {}
    }

    function formatUptime(s) {
      if (s < 60) return `${s}s`;
      if (s < 3600) return `${Math.floor(s / 60)}min`;
      return `${Math.floor(s / 3600)}h ${Math.floor((s % 3600) / 60)}min`;
    }

    // ─── Toast ──────────────────────────────────────
    function toast(msg, type = 'success') {
      const container = document.getElementById('toast-container');
      const el = document.createElement('div');
      el.className = `toast ${type}`;
      el.textContent = msg;
      container.appendChild(el);
      setTimeout(() => el.remove(), 4000);
    }

    // ─── Init ───────────────────────────────────────
    connectWS();
    setInterval(pollHealth, 30000);
    pollHealth();
  </script>
</body>
</html>
