<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calibração CV — AYA Expo Tools</title>
  <link rel="stylesheet" href="shared.css">
  <style>
    .page { display: grid; grid-template-columns: 240px 1fr; gap: 0; height: calc(100vh - 57px); }

    /* ── Painel esquerdo ── */
    .sidebar {
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      overflow-y: auto; padding: 16px;
    }
    .sidebar-section { margin-bottom: 20px; }
    .sidebar-label { font-size: 10px; text-transform: uppercase; letter-spacing: .08em; color: var(--text-dimmer); margin-bottom: 8px; }

    /* Camera tabs */
    .cam-tabs { display: flex; flex-direction: column; gap: 4px; }
    .cam-tab {
      padding: 8px 10px; border-radius: var(--radius);
      border: 1px solid var(--border); background: var(--bg);
      color: var(--text-dim); cursor: pointer; font-size: 13px;
      display: flex; align-items: center; gap: 8px; transition: all .15s;
    }
    .cam-tab:hover { border-color: var(--border-light); color: var(--text); }
    .cam-tab.active { border-color: var(--accent); color: var(--accent); background: rgba(255,255,255,.04); }
    .cam-tab .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
    .cam-tab .dot.off { background: var(--text-dimmer); }

    /* Tools */
    .tool-btns { display: flex; flex-direction: column; gap: 4px; }
    .tool-btn {
      padding: 8px 10px; border-radius: var(--radius);
      border: 1px solid var(--border); background: var(--bg);
      color: var(--text-dim); cursor: pointer; font-size: 13px;
      display: flex; align-items: center; gap: 8px; transition: all .15s;
      text-align: left;
    }
    .tool-btn:hover { border-color: var(--border-light); color: var(--text); }
    .tool-btn.active { border-color: var(--blue); color: var(--blue); background: var(--blue-bg); }
    .tool-icon { font-size: 14px; }

    /* Zonas */
    .zone-list { display: flex; flex-direction: column; gap: 4px; }
    .zone-item {
      padding: 7px 10px; border-radius: var(--radius);
      border: 1px solid var(--border); background: var(--bg);
      display: flex; align-items: center; gap: 8px;
      font-size: 12px; cursor: pointer; transition: all .15s;
    }
    .zone-item:hover { border-color: var(--border-light); }
    .zone-item.active { border-color: v; }
    .zone-swatch { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
    .zone-name { flex: 1; color: var(--text); }
    .zone-cam { font-size: 10px; color: var(--text-dimmer); font-family: 'JetBrains Mono', monospace; }
    .zone-del { color: var(--text-dimmer); font-size: 14px; padding: 0 2px; line-height: 1; }
    .zone-del:hover { color: var(--red); }

    .btn-add {
      padding: 7px 10px; border-radius: var(--radius);
      border: 1px dashed var(--border); background: transparent;
      color: var(--text-dimmer); cursor: pointer; font-size: 12px;
      width: 100%; text-align: left; transition: all .15s;
    }
    .btn-add:hover { border-color: var(--border-light); color: var(--text); }

    /* Counter line section */
    .line-info {
      font-size: 11px; font-family: 'JetBrains Mono', monospace;
      color: var(--text-dim); padding: 6px 8px;
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); word-break: break-all;
    }
    .line-clear {
      margin-top: 6px; font-size: 11px; color: var(--text-dimmer);
      cursor: pointer; background: none; border: none; padding: 0; text-decoration: underline;
    }
    .line-clear:hover { color: var(--red); }

    /* ── Área principal ── */
    .main { display: flex; flex-direction: column; padding: 16px; gap: 12px; overflow: hidden; }

    .canvas-wrap {
      position: relative; flex: 1; min-height: 0;
      background: #000; border: 1px solid var(--border); border-radius: var(--radius);
      overflow: hidden; cursor: crosshair;
    }
    .canvas-wrap img {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%; object-fit: contain; display: block;
      pointer-events: none; user-select: none;
    }
    .canvas-wrap canvas {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    }
    .canvas-hint {
      position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,.7); color: var(--text-dim);
      font-size: 11px; padding: 4px 10px; border-radius: 20px;
      pointer-events: none; white-space: nowrap;
    }

    .toolbar {
      display: flex; align-items: center; gap: 10px;
      flex-shrink: 0;
    }
    .btn {
      padding: 8px 16px; border-radius: var(--radius);
      border: 1px solid var(--border); background: var(--bg-card);
      color: var(--text); cursor: pointer; font-size: 13px;
      transition: all .15s; font-family: inherit;
    }
    .btn:hover { border-color: var(--border-light); background: var(--bg-card-hover); }
    .btn.primary { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }
    .btn.primary:hover { background: #e5e5e5; }
    .btn.danger { border-color: var(--red); color: var(--red); }
    .btn.danger:hover { background: var(--red-bg); }
    .toolbar-sep { flex: 1; }
    .save-msg { font-size: 12px; color: var(--green); display: none; }
  </style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <a href="/" style="text-decoration:none; color: var(--text-dim); font-size:13px;">← Início</a>
  </div>
  <div class="header-center">
    <span style="font-size:14px; font-weight:600;">Calibração CV</span>
    <span id="expo-name" style="font-size:12px; color:var(--text-dim); margin-left:8px;"></span>
  </div>
  <div class="header-right"></div>
</div>

<div class="page">

  <!-- ── Sidebar ── -->
  <div class="sidebar">

    <div class="sidebar-section">
      <div class="sidebar-label">Câmera</div>
      <div class="cam-tabs" id="cam-tabs"></div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Ferramenta</div>
      <div class="tool-btns">
        <button class="tool-btn active" id="tool-zone" onclick="setTool('zone')">
          <span class="tool-icon">⬡</span> Zona (polígono)
        </button>
        <button class="tool-btn" id="tool-line" onclick="setTool('line')">
          <span class="tool-icon">╱</span> Linha de contagem
        </button>
      </div>
    </div>

    <div class="sidebar-section" id="zones-section">
      <div class="sidebar-label">Zonas <span style="color:var(--text-dimmer);font-size:9px;text-transform:none;margin-left:4px;">(todas as câmeras)</span></div>
      <div class="zone-list" id="zone-list"></div>
      <button class="btn-add" onclick="addZone()">+ Nova zona</button>
    </div>

    <div class="sidebar-section" id="line-section" style="display:none;">
      <div class="sidebar-label">Linha de contagem</div>
      <div class="line-info" id="line-info">não configurada</div>
      <button class="line-clear" onclick="clearLine()">Limpar linha</button>
      <div style="margin-top:10px; font-size:11px; color:var(--text-dimmer); line-height:1.5;">
        Clique em 2 pontos na imagem para definir a linha.<br>
        Pessoas que cruzam de cima→baixo = <span style="color:var(--green)">entrada</span><br>
        Pessoas que cruzam de baixo→cima = <span style="color:var(--red)">saída</span>
      </div>
    </div>

  </div>

  <!-- ── Main ── -->
  <div class="main">

    <div class="canvas-wrap" id="canvas-wrap" onclick="handleCanvasClick(event)">
      <img id="cam-frame" src="" alt="" />
      <canvas id="overlay"></canvas>
      <div class="canvas-hint" id="canvas-hint">Selecione uma câmera</div>
    </div>

    <div class="toolbar">
      <button class="btn danger" onclick="cancelDrawing()">Cancelar desenho</button>
      <span class="toolbar-sep"></span>
      <span class="save-msg" id="save-msg">✓ Salvo</span>
      <button class="btn" onclick="reloadDetectors()">Reiniciar detectores</button>
      <button class="btn primary" onclick="saveConfig()">Salvar configuração</button>
    </div>

  </div>
</div>

<script>
// ── Estado global ──────────────────────────────────────────────────────────

const FRAME_W = 1920, FRAME_H = 1080;
const ZONE_COLORS = ['#3b82f6','#22c55e','#f59e0b','#ec4899','#8b5cf6','#06b6d4','#f97316','#84cc16'];

let config = {};
let currentCam = null;
let currentTool = 'zone';
let drawing = [];          // pontos sendo desenhados agora
let linePoints = [];       // pontos da linha em desenho (max 2)
let activeZoneId = null;   // zona selecionada para editar

// ── Init ───────────────────────────────────────────────────────────────────

async function init() {
  const res = await fetch('/api/config');
  config = await res.json();

  document.getElementById('expo-name').textContent = config.exhibition?.name || '';

  // Câmeras
  const cameras = config.cv?.cameras || [];
  const tabs = document.getElementById('cam-tabs');
  cameras.forEach((camId, i) => {
    const t = document.createElement('button');
    t.className = 'cam-tab' + (i === 0 ? ' active' : '');
    t.innerHTML = `<span class="dot"></span>${camId}`;
    t.onclick = () => selectCam(camId);
    tabs.appendChild(t);
  });

  renderZones();
  renderLine();

  if (cameras.length > 0) selectCam(cameras[0]);

  // Atualiza frame a cada 2s
  setInterval(refreshFrame, 2000);
}

// ── Câmera ─────────────────────────────────────────────────────────────────

function selectCam(camId) {
  currentCam = camId;
  cancelDrawing();

  document.querySelectorAll('.cam-tab').forEach(t => {
    t.classList.toggle('active', t.textContent.trim() === camId);
  });

  refreshFrame();
  renderOverlay();
  document.getElementById('canvas-hint').textContent = getHint();
}

function refreshFrame() {
  if (!currentCam) return;
  const img = document.getElementById('cam-frame');
  img.src = `/api/cv/${currentCam}/frame?t=${Date.now()}`;
  img.onload = () => {
    resizeCanvas();
    renderOverlay();
  };
}

// ── Canvas / coordenadas ───────────────────────────────────────────────────

function resizeCanvas() {
  const wrap = document.getElementById('canvas-wrap');
  const canvas = document.getElementById('overlay');
  canvas.width = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
  renderOverlay();
}

/** Converte clique no canvas para coordenadas 1920×1080 do frame. */
function canvasToFrame(cx, cy) {
  const img = document.getElementById('cam-frame');
  const wrap = document.getElementById('canvas-wrap');

  const wW = wrap.clientWidth, wH = wrap.clientHeight;
  const scale = Math.min(wW / FRAME_W, wH / FRAME_H);
  const ox = (wW - FRAME_W * scale) / 2;
  const oy = (wH - FRAME_H * scale) / 2;

  return [
    Math.round((cx - ox) / scale),
    Math.round((cy - oy) / scale),
  ];
}

/** Converte coordenadas do frame para o canvas. */
function frameToCanvas(fx, fy) {
  const wrap = document.getElementById('canvas-wrap');
  const wW = wrap.clientWidth, wH = wrap.clientHeight;
  const scale = Math.min(wW / FRAME_W, wH / FRAME_H);
  const ox = (wW - FRAME_W * scale) / 2;
  const oy = (wH - FRAME_H * scale) / 2;
  return [ox + fx * scale, oy + fy * scale];
}

// ── Interação ──────────────────────────────────────────────────────────────

function handleCanvasClick(e) {
  if (!currentCam) return;

  const wrap = document.getElementById('canvas-wrap');
  const rect = wrap.getBoundingClientRect();
  const cx = e.clientX - rect.left;
  const cy = e.clientY - rect.top;
  const [fx, fy] = canvasToFrame(cx, cy);

  // Fora do frame
  if (fx < 0 || fx > FRAME_W || fy < 0 || fy > FRAME_H) return;

  if (currentTool === 'zone') {
    handleZoneClick(fx, fy, cx, cy);
  } else if (currentTool === 'line') {
    handleLineClick(fx, fy);
  }
}

// ── Ferramenta: Zona ───────────────────────────────────────────────────────

function handleZoneClick(fx, fy, cx, cy) {
  if (!activeZoneId) {
    // Nenhuma zona selecionada — cria nova automaticamente
    addZone();
    return;
  }

  // Fecha polígono se clicou perto do primeiro ponto
  if (drawing.length >= 3) {
    const [fpx, fpy] = drawing[0];
    const [cpx, cpy] = frameToCanvas(fpx, fpy);
    const dist = Math.sqrt((cx - cpx) ** 2 + (cy - cpy) ** 2);
    if (dist < 12) {
      closePolygon();
      return;
    }
  }

  drawing.push([fx, fy]);
  renderOverlay();
  updateHint();
}

function closePolygon() {
  if (!activeZoneId || drawing.length < 3) return;

  const zone = getZones().find(z => z.id === activeZoneId);
  if (!zone) return;

  zone.polygon = [...drawing];
  // Garante que a câmera atual está na lista de câmeras da zona
  if (!zone.cameras) zone.cameras = [];
  if (!zone.cameras.includes(currentCam)) zone.cameras.push(currentCam);

  drawing = [];
  renderOverlay();
  renderZones();
  updateHint();
}

// ── Ferramenta: Linha ──────────────────────────────────────────────────────

function handleLineClick(fx, fy) {
  linePoints.push([fx, fy]);
  renderOverlay();

  if (linePoints.length === 2) {
    // Salva linha no config
    if (!config.cv.counter) config.cv.counter = {};
    config.cv.counter.camera = currentCam;
    config.cv.counter.line = linePoints.map(p => p.join(',')).join(',');
    linePoints = [];
    renderLine();
    renderOverlay();
    updateHint();
  }
}

function clearLine() {
  if (config.cv?.counter) delete config.cv.counter.line;
  linePoints = [];
  renderLine();
  renderOverlay();
}

// ── Render ─────────────────────────────────────────────────────────────────

function renderOverlay() {
  const canvas = document.getElementById('overlay');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Desenha zonas existentes
  getZones().forEach((zone, i) => {
    if (!zone.polygon || zone.polygon.length < 2) return;
    if (!zone.cameras?.includes(currentCam) && zone.cameras?.length > 0) return;

    const color = ZONE_COLORS[i % ZONE_COLORS.length];
    const pts = zone.polygon.map(([x, y]) => frameToCanvas(x, y));
    const isActive = zone.id === activeZoneId;

    ctx.beginPath();
    ctx.moveTo(pts[0][0], pts[0][1]);
    pts.slice(1).forEach(([x, y]) => ctx.lineTo(x, y));
    ctx.closePath();
    ctx.fillStyle = hexAlpha(color, isActive ? .2 : .12);
    ctx.fill();
    ctx.strokeStyle = color;
    ctx.lineWidth = isActive ? 2 : 1.5;
    ctx.stroke();

    // Label no centroide
    const cx = pts.reduce((s, p) => s + p[0], 0) / pts.length;
    const cy = pts.reduce((s, p) => s + p[1], 0) / pts.length;
    ctx.fillStyle = color;
    ctx.font = '12px Inter, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(zone.name || zone.id, cx, cy);

    // Vértices
    if (isActive) {
      pts.forEach(([x, y], vi) => {
        ctx.beginPath();
        ctx.arc(x, y, vi === 0 ? 6 : 4, 0, Math.PI * 2);
        ctx.fillStyle = vi === 0 ? '#fff' : color;
        ctx.fill();
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 1;
        ctx.stroke();
      });
    }
  });

  // Desenha polígono em construção
  if (drawing.length > 0 && activeZoneId) {
    const zone = getZones().find(z => z.id === activeZoneId);
    const color = ZONE_COLORS[getZones().indexOf(zone) % ZONE_COLORS.length] || '#3b82f6';
    const pts = drawing.map(([x, y]) => frameToCanvas(x, y));

    ctx.strokeStyle = color;
    ctx.lineWidth = 1.5;
    ctx.setLineDash([5, 3]);
    ctx.beginPath();
    ctx.moveTo(pts[0][0], pts[0][1]);
    pts.slice(1).forEach(([x, y]) => ctx.lineTo(x, y));
    ctx.stroke();
    ctx.setLineDash([]);

    pts.forEach(([x, y], i) => {
      ctx.beginPath();
      ctx.arc(x, y, i === 0 ? 6 : 4, 0, Math.PI * 2);
      ctx.fillStyle = i === 0 ? '#fff' : color;
      ctx.fill();
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 1;
      ctx.stroke();
    });
  }

  // Linha de contagem configurada
  const lineStr = config.cv?.counter?.line;
  const counterCam = config.cv?.counter?.camera;
  if (lineStr && counterCam === currentCam) {
    const coords = lineStr.split(',').map(Number);
    if (coords.length === 4) {
      const [x1, y1, x2, y2] = coords;
      const [cx1, cy1] = frameToCanvas(x1, y1);
      const [cx2, cy2] = frameToCanvas(x2, y2);
      drawLine(ctx, cx1, cy1, cx2, cy2, '#f59e0b', true);
    }
  }

  // Linha em construção
  if (linePoints.length === 1) {
    const [cx, cy] = frameToCanvas(linePoints[0][0], linePoints[0][1]);
    ctx.beginPath();
    ctx.arc(cx, cy, 5, 0, Math.PI * 2);
    ctx.fillStyle = '#f59e0b';
    ctx.fill();
  }
}

function drawLine(ctx, x1, y1, x2, y2, color, arrow = false) {
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();

  // Pontos nas extremidades
  [[x1,y1],[x2,y2]].forEach(([x,y]) => {
    ctx.beginPath();
    ctx.arc(x, y, 5, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.fill();
  });

  // Seta no meio indicando direção
  if (arrow) {
    const mx = (x1 + x2) / 2, my = (y1 + y2) / 2;
    const angle = Math.atan2(y2 - y1, x2 - x1) + Math.PI / 2; // perpendicular para baixo = entrada
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(mx + Math.cos(angle) * 10, my + Math.sin(angle) * 10);
    ctx.lineTo(mx + Math.cos(angle - 2.4) * 6, my + Math.sin(angle - 2.4) * 6);
    ctx.lineTo(mx + Math.cos(angle + 2.4) * 6, my + Math.sin(angle + 2.4) * 6);
    ctx.closePath();
    ctx.fill();
  }
}

// ── Zonas ──────────────────────────────────────────────────────────────────

function getZones() {
  return config.cv?.zones || [];
}

function addZone() {
  if (!config.cv) config.cv = {};
  if (!config.cv.zones) config.cv.zones = [];

  const id = 'zona-' + Date.now().toString(36);
  const name = prompt('Nome da zona:', 'Nova Zona');
  if (!name) return;

  config.cv.zones.push({
    id,
    name,
    cameras: [currentCam],
    polygon: [],
    alert: {},
  });

  activeZoneId = id;
  drawing = [];
  renderZones();
  renderOverlay();
  updateHint();
}

function deleteZone(id) {
  if (!confirm('Remover esta zona?')) return;
  config.cv.zones = config.cv.zones.filter(z => z.id !== id);
  if (activeZoneId === id) { activeZoneId = null; drawing = []; }
  renderZones();
  renderOverlay();
}

function selectZone(id) {
  activeZoneId = id;
  drawing = [];
  currentTool = 'zone';
  updateToolButtons();
  renderZones();
  renderOverlay();
  updateHint();
}

function renderZones() {
  const list = document.getElementById('zone-list');
  const zones = getZones();
  list.innerHTML = '';

  if (zones.length === 0) {
    list.innerHTML = '<div style="font-size:12px;color:var(--text-dimmer);padding:4px 0;">Nenhuma zona definida</div>';
    return;
  }

  zones.forEach((zone, i) => {
    const color = ZONE_COLORS[i % ZONE_COLORS.length];
    const isActive = zone.id === activeZoneId;
    const hasPoly = zone.polygon?.length >= 3;
    const div = document.createElement('div');
    div.className = 'zone-item' + (isActive ? ' active' : '');
    div.style.borderColor = isActive ? color : '';
    div.onclick = () => selectZone(zone.id);
    div.innerHTML = `
      <span class="zone-swatch" style="background:${color}${hasPoly ? '' : ';opacity:.4'}"></span>
      <span class="zone-name">${zone.name}</span>
      <span class="zone-cam">${(zone.cameras || []).join(', ')}</span>
      <span class="zone-del" onclick="event.stopPropagation();deleteZone('${zone.id}')" title="Remover">✕</span>
    `;
    list.appendChild(div);
  });
}

function renderLine() {
  const info = document.getElementById('line-info');
  const line = config.cv?.counter?.line;
  const cam = config.cv?.counter?.camera;
  info.textContent = line ? `${cam}: ${line}` : 'não configurada';
}

// ── Ferramentas ────────────────────────────────────────────────────────────

function setTool(tool) {
  currentTool = tool;
  drawing = [];
  linePoints = [];
  updateToolButtons();
  updateHint();
  renderOverlay();

  document.getElementById('zones-section').style.display = tool === 'zone' ? '' : 'none';
  document.getElementById('line-section').style.display = tool === 'line' ? '' : 'none';
}

function updateToolButtons() {
  document.getElementById('tool-zone').classList.toggle('active', currentTool === 'zone');
  document.getElementById('tool-line').classList.toggle('active', currentTool === 'line');
}

function cancelDrawing() {
  drawing = [];
  linePoints = [];
  renderOverlay();
  updateHint();
}

function getHint() {
  if (!currentCam) return 'Selecione uma câmera';
  if (currentTool === 'zone') {
    if (!activeZoneId) return 'Selecione ou crie uma zona no painel';
    if (drawing.length === 0) return 'Clique para começar o polígono';
    if (drawing.length < 3) return `${drawing.length} ponto(s) — continue clicando`;
    return 'Continue clicando ou clique no 1º ponto para fechar';
  }
  if (currentTool === 'line') {
    if (linePoints.length === 0) return 'Clique no 1º ponto da linha';
    return 'Clique no 2º ponto para concluir a linha';
  }
  return '';
}

function updateHint() {
  document.getElementById('canvas-hint').textContent = getHint();
}

// ── Salvar ─────────────────────────────────────────────────────────────────

async function saveConfig() {
  const btn = document.querySelector('.btn.primary');
  btn.textContent = 'Salvando...';
  btn.disabled = true;

  try {
    // Usa PUT /api/config para salvar o config completo
    const res = await fetch('/api/config', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(config),
    });
    if (!res.ok) throw new Error(await res.text());

    const msg = document.getElementById('save-msg');
    msg.style.display = 'inline';
    setTimeout(() => msg.style.display = 'none', 3000);
  } catch (e) {
    alert('Erro ao salvar: ' + e.message);
  } finally {
    btn.textContent = 'Salvar configuração';
    btn.disabled = false;
  }
}

async function reloadDetectors() {
  await fetch('/api/cv/stop', { method: 'POST' });
  await new Promise(r => setTimeout(r, 1500));
  await fetch('/api/cv/start', { method: 'POST' });
  alert('Detectores reiniciados com a nova configuração.');
}

// ── Utils ──────────────────────────────────────────────────────────────────

function hexAlpha(hex, alpha) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

// Teclado
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') cancelDrawing();
  if (e.key === 'Enter' && drawing.length >= 3) closePolygon();
  if (e.key === 'Backspace' && drawing.length > 0) {
    drawing.pop();
    renderOverlay();
    updateHint();
  }
});

window.addEventListener('resize', () => { resizeCanvas(); renderOverlay(); });

init();
</script>
